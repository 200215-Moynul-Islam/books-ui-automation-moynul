name: Books UI Automation Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Create report directories
        run: |
          mkdir -p test-results
          mkdir -p allure-results

      - name: Run automation tests
        run: |
          pytest \
            --html=test-results/report.html \
            --self-contained-html \
            --alluredir=allure-results
        continue-on-error: true

      - name: Set up Java
        if: always()
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Allure CLI
        if: always()
        run: |
          wget https://github.com/allure-framework/allure2/releases/download/2.34.1/allure-2.34.1.tgz
          tar -xzf allure-2.34.1.tgz
          echo "${{ github.workspace }}/allure-2.34.1/bin" >> $GITHUB_PATH

      - name: Generate Allure report
        if: always()
        run: |
          allure generate allure-results -o allure-report --clean

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: automation-reports
          path: |
            test-results/
            allure-results/
            allure-report/
          if-no-files-found: ignore

      - name: Setup GitHub Pages
        if: always() && github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: always() && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

  deploy:
    needs: test
    if: always() && github.event_name != 'pull_request'

    permissions:
      pages: write
      id-token: write

    runs-on: ubuntu-latest

    environment:
      name: github-pages

    steps:
      - name: Deploy Allure report to GitHub Pages
        uses: actions/deploy-pages@v4
